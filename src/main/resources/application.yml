server:
  port: 8080

spring:
  # ========== 默认使用 H2 内嵌数据库（无需安装任何数据库） ==========
  datasource:
    url: jdbc:h2:mem:ecommerce;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      table-prefix: ""
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ========== SQL Server 配置（需要时切换） ==========
# 使用方式: mvn spring-boot:run -Dspring-boot.run.profiles=sqlserver
---
spring:
  config:
    activate:
      on-profile: sqlserver
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=ecommerce;encrypt=false;trustServerCertificate=true
    username: sa
    password: 123456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: never